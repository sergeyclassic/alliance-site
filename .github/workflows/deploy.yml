name: Deploy to reg.ru

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check FTP config
        id: cfg
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          if [ -n "$FTP_HOST" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::FTP-секреты не заданы — деплой пропущен. Добавьте FTP_HOST/FTP_USER/FTP_PASS/FTP_DIR в Settings → Secrets and variables → Actions."
          fi

      - name: Checkout
        if: steps.cfg.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Deploy via FTP
        if: steps.cfg.outputs.ready == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: ${{ secrets.FTP_DIR }}
          protocol: ftps
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.nojekyll
            **/README*
